<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sua Conquista Diária - App Oficial</title>
    <style>
        :root { --dourado: #d4af37; --fundo: #000000; }
        body { font-family: sans-serif; background-color: var(--fundo); color: white; text-align: center; padding: 40px 20px; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .logo-container { width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--dourado); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); overflow: hidden; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; background: #000; }
        .logo-container img { width: 100%; height: 100%; object-fit: contain; }
        h1 { color: var(--dourado); font-size: 26px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        p { color: #aaa; margin-bottom: 30px; font-style: italic; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; max-width: 300px; margin: 15px auto; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.3s; border: none; cursor: pointer; }
        .android { background: linear-gradient(135deg, #d4af37, #b8860b); color: black; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        .ios { background-color: #ffffff; color: black; }
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }
        .ios-tip { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; font-size: 14px; max-width: 300px; margin: 25px auto; border: 1px dashed #444; line-height: 1.4; }
        .footer { margin-top: 50px; font-size: 12px; color: #555; }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="logo.png" alt="Sua Conquista Diária">
    </div>
    <h1>Sua Conquista Diária</h1>
    <p>O seu refúgio digital de fé e oração.</p>

    <a href="https://github.com/ConquistaDiaria/app-Conquista-Di-ria/releases/download/v1/app3957719-hr0xep.apk" class="btn android">
        📥 BAIXAR PARA ANDROID
    </a>

    <a href="https://suaconquistadiaria.lovable.app" target="_blank" class="btn ios">
        🍎 INSTALAR NO IPHONE
    </a>

    <div class="ios-tip">
        <strong>Dica para iPhone/iOS:</strong><br>
        Abra o link acima, toque no ícone de <b>Compartilhar</b> e selecione <b>"Adicionar à Tela de Início"</b>.
    </div>

    <div class="footer">
        © 2026 Sua Conquista Diária<br>
        "Se uma capivara conseguiu, você também consegue!" 🐾
    </div>
</body>
</html>
